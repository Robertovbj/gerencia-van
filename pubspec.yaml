name: gerencia_van
description: "Gerenciador de Van Escolar"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.20.2
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "AppIcons/playstore.png"
  adaptive_icon_background: "AppIcons/playstore.png"
  adaptive_icon_foreground: "AppIcons/playstore.png"

flutter:
  uses-material-design: true
